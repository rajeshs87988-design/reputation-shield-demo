<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reputation Shield PRO | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #000; 
            background-image: radial-gradient(circle at 0% 0%, #111827 0%, #000000 50%);
            min-height: 100vh; 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            padding: 20px;
        }
        
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 28px; 
            padding: 24px; 
        }

        .text-glow { text-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }

        /* Hide Scrollbars but keep scrolling */
        #feedbackList {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        #feedbackList::-webkit-scrollbar { display: none; }

        canvas { filter: drop-shadow(0px 10px 15px rgba(59, 130, 246, 0.1)); }

        @media (max-width: 640px) {
            body { padding: 16px; }
            .glass { padding: 20px; }
            h1 { font-size: 1.875rem !important; }
        }
    </style>
</head>
<body class="antialiased">
    <div class="max-w-4xl mx-auto">
        
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tighter text-glow">Reputation Shield <span class="text-blue-500">PRO</span></h1>
                <p class="text-gray-500 text-xs font-bold uppercase tracking-widest mt-1">Live Intelligence Engine</p>
            </div>
            <div class="bg-blue-500/10 border border-blue-500/20 rounded-full px-4 py-1.5 flex items-center gap-2">
                <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse shadow-[0_0_8px_#3b82f6]"></span>
                <span class="text-[10px] font-black tracking-widest text-blue-400">ENCRYPTED LIVE</span>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
            <div class="glass flex flex-col items-center justify-center py-8">
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Total Clicks</p>
                <div id="totalCount" class="text-5xl font-black tracking-tighter italic">0</div>
            </div>
            <div class="glass flex flex-col items-center justify-center py-8 border-b-2 border-amber-500/30">
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Filtered</p>
                <div id="filteredCount" class="text-5xl font-black tracking-tighter italic text-amber-500">0</div>
            </div>
            <div class="glass flex flex-col items-center justify-center py-8 border-b-2 border-emerald-500/30">
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Health</p>
                <div id="healthScoreText" class="text-5xl font-black tracking-tighter italic text-emerald-400">100%</div>
            </div>
        </div>

        <div class="glass mb-6">
            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-6 flex items-center gap-2">
                <span class="w-1 h-3 bg-blue-600 rounded-full"></span> Engagement Trends
            </h3>
            <div class="h-48 sm:h-64"><canvas id="reputationChart"></canvas></div>
        </div>

        <div class="glass">
            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-6 flex items-center gap-2">
                <span class="w-1 h-3 bg-amber-600 rounded-full"></span> Live Feedback Feed
            </h3>
            <div id="feedbackList" class="space-y-4 max-h-[400px] overflow-y-auto">
                </div>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyxNOjv_lVvk0l9xMnlyjcGQY0g-TPu6-KK1Ch3YEqN-cWC1YV8P8sL24Sq3orOLBYs/exec"; 
        let myChart = null;

        async function updateDashboard() {
            try {
                const response = await fetch(APPS_SCRIPT_URL);
                const rows = await response.json();
                
                let starsTotal = 0, filtered = 0;
                const daily = {};
                const list = document.getElementById('feedbackList');
                list.innerHTML = '';

                rows.forEach(row => {
                    const stars = parseInt(row.rating) || 0;
                    const timestamp = new Date(row.timestamp);
                    const dateFormatted = timestamp.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
                    const timeFormatted = timestamp.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    
                    starsTotal += stars;
                    if(stars < 4) filtered++;
                    daily[dateFormatted] = (daily[dateFormatted] || 0) + 1;

                    const item = document.createElement('div');
                    item.className = "p-5 bg-white/[0.02] rounded-3xl border border-white/5";
                    item.innerHTML = `
                        <div class='flex justify-between items-start mb-3'>
                            <div>
                                <span class='text-[10px] font-bold text-blue-500 uppercase block tracking-widest'>${dateFormatted}</span>
                                <span class='text-[9px] text-gray-600 font-mono uppercase'>Time: ${timeFormatted}</span>
                            </div>
                            <span class='text-yellow-500 text-[10px] tracking-[3px]'>${"★".repeat(stars)}</span>
                        </div>
                        <div class='text-gray-300 text-sm font-medium leading-relaxed'>${row.feedback}</div>
                    `;
                    list.prepend(item);
                });

                document.getElementById('totalCount').innerText = rows.length;
                document.getElementById('filteredCount').innerText = filtered;
                document.getElementById('healthScoreText').innerText = rows.length > 0 ? Math.round((starsTotal/(rows.length*5))*100) + "%" : "100%";

                const ctx = document.getElementById('reputationChart').getContext('2d');
                if(myChart) myChart.destroy();
                myChart = new Chart(ctx, { 
                    type: 'line', 
                    data: { 
                        labels: Object.keys(daily), 
                        datasets: [{ 
                            data: Object.values(daily), 
                            borderColor: '#3b82f6', 
                            borderWidth: 4,
                            pointRadius: 0,
                            pointHoverRadius: 6,
                            tension: 0.45, 
                            fill: true, 
                            backgroundColor: (context) => {
                                const ctx = context.chart.ctx;
                                const gradient = ctx.createLinearGradient(0, 0, 0, 300);
                                gradient.addColorStop(0, 'rgba(59, 130, 246, 0.2)');
                                gradient.addColorStop(1, 'rgba(59, 130, 246, 0)');
                                return gradient;
                            }
                        }] 
                    }, 
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false, 
                        plugins: { legend: { display: false } }, 
                        scales: { 
                            y: { display: false }, 
                            x: { grid: { display: false }, ticks: { color: '#4b5563', font: { size: 9, weight: 'bold' } } } 
                        } 
                    } 
                });
            } catch (e) { console.error("Sync Error", e); }
        }

        setInterval(updateDashboard, 10000); 
        updateDashboard();
    </script>
</body>
</html>
